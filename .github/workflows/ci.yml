name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run portable CI verification
        run: npm run verify:ci

  protocol-host:
    name: Protocol host checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt

      - name: Check protocol formatting
        run: cargo fmt --manifest-path programs/cryptoseeds_protocol/Cargo.toml -- --check

      - name: Run protocol unit tests
        run: cargo test --manifest-path programs/cryptoseeds_protocol/Cargo.toml
