name: External Audits

on:
  schedule:
    - cron: "21 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ryp-mint:
    name: RYP mint authority audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify RYP mint
        run: npm run token:check
